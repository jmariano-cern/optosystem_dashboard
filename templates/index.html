<!DOCTYPE html>
<html>

<head>
<title>Component Testing Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
.component-card {
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 20px;
    display: inline-block;
    vertical-align: top;
    width: 300px;
}
.progress-bar-container {
    width: 100%;
    background: #eee;
    border: 1px solid #999;
}
.progress-bar {
    height: 20px;
    text-align: center;
    color: white;
}
</style>
</head>

<body>

<h1>Project Overview</h1>

{% for comp, data in summary.items() %}
<div class="component-card">
  <h3>{{comp}}</h3>
  <b>Total Good:</b> {{data.good}} / {{data.total}}<br>
  <b>Yield:</b> {{(data.yield_estimate*100)|round(2)}} %<br><br>

  <!-- Progress bar -->
  <div class="progress-bar-container">
    <div class="progress-bar" style="width:{{(data.progress*100)|round(1)}}%;background:green">
      {{(data.progress*100)|round(1)}} %
    </div>
  </div>

  <br>

  <!-- Status composition pie chart -->
  <canvas id="pie-{{comp}}" width="250" height="250"></canvas>

  <br>
  <a href="/status/{{comp}}">Go to {{comp}} Status Page</a>
</div>
{% endfor %}

<script>
// Draw the pie charts
{% for comp, data in summary.items() %}
new Chart(document.getElementById("pie-{{comp}}"), {
    type: 'pie',
    data: {
        labels: ["Good","Bad","Under Investigation"],
        datasets: [{
            data: [{{data.good}}, {{data.bad}}, {{data.investigation}}],
            backgroundColor: ["green","red","orange"]
        }]
    }
});
{% endfor %}
</script>

<br>

<a href="/submit">Enter Test Result</a>

</body>
</html>
