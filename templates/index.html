<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Opto Dashboard</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 40px;
    text-align: center;
}

h1 {
    margin-bottom: 50px;
}

.card-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

.card {
    background-color: #f0f0f0;
    border-radius: 12px;
    width: 220px;
    height: 150px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    color: black;
    font-size: 20px;
    font-weight: bold;
    box-shadow: 2px 4px 8px rgba(0,0,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 4px 8px 16px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<h1>Optosystem Production Testing Dashboard</h1>

<div class="card-container">
    <a class="card" href="/component_dashboard">Component Dashboard</a>
    <!-- <a class="card" href="/tester_dashboard">Tester Dashboard</a> -->
    <a class="card" href="/calendar">Shift Calendar</a>
    <a class="card" href="/daily_snapshot">Daily Snapshot</a>
    <!-- <a class="card" href="/submit">Enter Test</a> -->
</div>

</body>
</html>
