<h1>{{component}} Status</h1>

Total tested: {{total}} <br>
Good: {{good}} <br>
Bad: {{bad}} <br>
Under investigation: {{investigation}} <br>

Yield: {{(yield_estimate*100)|round(2)}} %

<h3>Production Goal</h3>

<div style="width:400px;border:1px solid black;">
  <div style="width:{{progress}}%;background:green;color:white;">
    {{progress|round(1)}}%
  </div>
</div>

<h3>Failure Modes</h3>

<table>
<tr><th>Mode</th><th>Count</th></tr>

{% for k,v in failures.items() %}
<tr>
<td>{{k}}</td>
<td>{{v}}</td>
</tr>
{% endfor %}

</table>

<canvas id="timeline"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/charts.js"></script>
